name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install only the pure-Python deps needed for unit tests (no GTK required)
          pip install pytest imapclient google-auth google-auth-oauthlib secretstorage jeepney
          pip install -e . --no-deps

      - name: Run unit tests
        run: pytest tests/test_models.py tests/test_utils.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check jotter/ --select=E,F,W --ignore=E501,E402,F401
