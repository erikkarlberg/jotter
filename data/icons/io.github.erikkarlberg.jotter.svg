<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="128"
     height="128"
     viewBox="0 0 128 128"
     role="img">
  <title>Jotter</title>

  <g transform="translate(64,64)">

    <!-- Outer shadow layer -->
    <rect x="-56" y="-54" width="112" height="112" rx="22" fill="#1C6EBF"/>
    <!-- Main background -->
    <rect x="-54" y="-54" width="108" height="108" rx="20" fill="#2979C8"/>

    <!-- Paper -->
    <rect x="-40" y="-42" width="80" height="86" rx="5" fill="#FAFCFF"/>

    <!-- Header area -->
    <rect x="-40" y="-42" width="80" height="17" rx="5" fill="#E8F0FA"/>
    <rect x="-40" y="-32" width="80" height="7" fill="#E8F0FA"/>
    <line x1="-40" y1="-25" x2="40" y2="-25" stroke="#C8D8EE" stroke-width="1"/>

    <!-- Ruled lines -->
    <line x1="-29" y1="-13" x2="32" y2="-13" stroke="#D0DFF0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-29" y1="-1"  x2="32" y2="-1"  stroke="#D0DFF0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-29" y1="11"  x2="32" y2="11"  stroke="#D0DFF0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-29" y1="23"  x2="22" y2="23"  stroke="#D0DFF0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-29" y1="35"  x2="26" y2="35"  stroke="#D0DFF0" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Vertical cursor -->
    <rect x="-29" y="27" width="2" height="10" rx="1" fill="#4A90D9"/>

    <!-- Margin line -->
    <line x1="-20" y1="-25" x2="-20" y2="44" stroke="#F0C0C0" stroke-width="1" stroke-linecap="round" opacity="0.8"/>

  </g>
</svg>
